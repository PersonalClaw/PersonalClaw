<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PersonalClaw</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      -webkit-app-region: drag;
      user-select: none;
    }
    .container { text-align: center; }
    .logo { margin-bottom: 16px; }
    .logo svg { width: 56px; height: 56px; display: block; margin: 0 auto; }
    .title { font-size: 20px; font-weight: 600; margin-bottom: 24px; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #1e293b;
      border-top-color: #F97316;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    .status { font-size: 13px; color: #64748b; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"><svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" aria-label="PersonalClaw"><path fill="#F97316" d="M256 16C106 76 46 226 46 226c0 45 60 90 90 90 90 0 180-195 135-285l-15-15zm45 15c30 60 0 135 0 135 120 30 120 180 75 330 75-75 90-150 90-210 0-90-15-225-165-255z"/></svg></div>
    <div class="title">PersonalClaw</div>
    <div class="spinner"></div>
    <div class="status" id="status">Checking gateway…</div>
  </div>
  <script>
    window.electronAPI?.onStatus?.((msg) => {
      document.getElementById('status').textContent = msg;
    });
  </script>
</body>
</html>
