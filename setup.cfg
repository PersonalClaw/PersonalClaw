[flake8]
# PersonalClaw lint contract — the project's standing flake8 configuration.
# black owns formatting (line-length=100); flake8 enforces correctness only.
max-line-length = 100

# black-compatibility ignores (https://black.readthedocs.io/en/stable/guides/using_black_with_other_tools.html):
#   E203 — whitespace before ':' (black's slice style)
#   W503 — line break before binary operator (black wraps before operators)
#   E704 — statement on same line as def (black keeps stub-style one-liners)
extend-ignore = E203,W503,E704

# Directories that are not our source: vendored builds, generated web assets,
# the intra-repo venv, caches. static/dist is a symlink → web/dist (bundled JS).
exclude =
    .git,
    .venv,
    venv,
    build,
    dist,
    node_modules,
    web/dist,
    web/node_modules,
    desktop/node_modules,
    src/personalclaw/static/dist,
    __pycache__,
    .mypy_cache,
    .pytest_cache

per-file-ignores =
    # __init__.py re-exports: unused imports are the public API surface.
    __init__.py:F401
    # cli.py runs _ensure_ssl_certs() before its stdlib imports on purpose
    # (the console_scripts entry-point bypasses __main__.py), so E402 is expected.
    src/personalclaw/cli.py:E402
