[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "personalclaw-client"
version = "0.1.1"
description = "PersonalClaw Client — async Python client for the PersonalClaw Gateway"
readme = "README.md"
license = { text = "MIT" }
# Deliberately broader than core (>=3.12): the client is a thin, dependency-light
# library meant to be embeddable in tools on older interpreters.
requires-python = ">=3.9"

authors = [
    { name = "PersonalClaw contributors" },
]

keywords = ["personalclaw", "client", "ai", "agent", "gateway"]

classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Operating System :: OS Independent",
    "Topic :: Software Development :: Libraries",
    "Framework :: AsyncIO",
]

dependencies = ["aiohttp>=3.9"]

# NOTE: [project.urls] MUST come after the bare `dependencies` key — a table
# header placed earlier would absorb `dependencies` into the urls table (a TOML
# table runs until the next header), zeroing the runtime deps. (Same footgun
# fixed in the core pyproject, plan 34 T1.1.)
[project.urls]
Homepage      = "https://personalclaw.dev"
Documentation = "https://github.com/PersonalClaw/PersonalClaw/tree/main/docs"
Source        = "https://github.com/PersonalClaw/PersonalClaw"
Issues        = "https://github.com/PersonalClaw/PersonalClaw/issues"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23", "hypothesis>=6.0", "aiohttp"]

[tool.setuptools.packages.find]
include = ["personalclaw_client*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
