[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "personalclaw-client"
version = "0.1.0"
description = "PersonalClaw Client — async Python client for the PersonalClaw Gateway"
requires-python = ">=3.9"
dependencies = ["aiohttp>=3.9"]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23", "hypothesis>=6.0", "aiohttp"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
