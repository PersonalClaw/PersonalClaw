# Local-build overlay — build images from the working tree instead of
# pulling from the registry. Use when developing locally or when running
# a fork that has not been published.
#
#   docker compose -f deploy/compose/compose.yaml -f deploy/compose/compose.build.yaml up -d --build
#
# The `image:` keys still apply so the resulting images are tagged locally as
# `personalclaw-gateway:local` / `personalclaw-web:local`.
#
# `context: ../..` resolves to the PersonalClaw/ core dir (compose anchors relative
# build contexts to this file's directory: PersonalClaw/deploy/compose/ → PersonalClaw/).
# That dir holds src/, web/, and deploy/, so the Dockerfiles' `COPY src/`,
# `COPY web/`, `dockerfile: deploy/docker/…` all resolve unchanged after the
# core/app workspace split (Slice 0).
services:
  personalclaw-gateway:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.backend
      target: runtime
    image: personalclaw-gateway:local

  personalclaw-web:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.web
    image: personalclaw-web:local

  personalclaw-slack:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.backend
      target: runtime
    image: personalclaw-gateway:local
